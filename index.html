<body>
    <div id="pin-overlay">
        <div class="pin-container">
            <h2>Enter PIN to Access Games</h2>
            <input type="password" id="pin-input" placeholder="Enter PIN">
            <button id="pin-submit">Submit</button>
            <p id="pin-error" style="display:none; color:red;">Incorrect PIN. Try again.</p>
        </div>
    </div>
    <header class="site-header">
        <div class="header-inner">
            <nav class="site-nav">

        </div>
    </header>

    <main>
        <section class="controls-bar">
            <input id="search" type="search" placeholder="search games..." autocomplete="off" spellcheck="false">
        </section>

        <p id="no-results" class="no-results" style="display:none">nothing here</p>
        <div class="game-grid" id="game-grid"></div>
    </main>

    <footer class="site-footer">
        <p>games from <a href="https://truffled.lol" target="_blank" rel="noopener">truffled.lol</a>, <a href="https://gn-math.dev" target="_blank" rel="noopener">gn-math</a> &amp; <a href="https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/edit?pli=1&tab=t.xs5z8u2rwov7" target="_blank" rel="noopener">Ultimate Game Stash</a></p>
    </footer>

    <script src="games.js"></script>
    <script src="assets/app.js"></script>
    <script>
        const pinOverlay = document.getElementById('pin-overlay');
        const pinInput = document.getElementById('pin-input');
        const pinSubmit = document.getElementById('pin-submit');
        const pinError = document.getElementById('pin-error');

        if (sessionStorage.getItem('authenticated') === 'true') {
            pinOverlay.style.display = 'none';
        } else {
            pinSubmit.addEventListener('click', () => {
                if (pinInput.value === '2021') {
                    sessionStorage.setItem('authenticated', 'true');
                    pinOverlay.style.display = 'none';
                } else {
                    pinError.style.display = 'block';
                    pinInput.value = '';
                }
            });

            pinInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    pinSubmit.click();
                }
            });
        }
    </script>
</body>
